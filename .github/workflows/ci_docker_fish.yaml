name: Docker Build and Release

# Trigger: run only when a new Release is published
on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  # ${{ github.repository }} resolves to "owner/repo-name"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # packages: write is required to push to the GitHub Container Registry (ghcr.io)
      packages: write

    steps:
    - name: Checkout repository
      # Checks out the code for the Git tag associated with the published Release
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          # Extract the SemVer version from the Git tag (e.g., v1.2.3 -> 1.2.3, 1.2, 1)
          # This is the core of the Release flow
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}

          # Add a short commit-SHA tag for precise tracking
          type=sha,format=short

          # Add the "latest" tag only when the Release is not a pre-release
          type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        # This workflow only runs on Release, so we always want to push the image
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
